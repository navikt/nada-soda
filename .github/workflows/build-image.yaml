name: build and push image
on: 
  push:
    branches:
      - 'main'
      - 'v3'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build-and-push:
    name: Build and push docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set image name
        id: image-name
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "name=nada-soda-contracts" >> "$GITHUB_OUTPUT"
            echo "suffix=contracts" >> "$GITHUB_OUTPUT"
          else
            echo "name=nada-soda" >> "$GITHUB_OUTPUT"
            echo "suffix=" >> "$GITHUB_OUTPUT"
          fi
      - name: Push docker image to GAR
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: nada
          image_suffix: ${{ steps.image-name.outputs.suffix }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ steps.image-name.outputs.name }}:${{ steps.docker-build-push.outputs.tag }}
      - name: Create release
        uses: ncipollo/release-action@v1
        with: 
          name: ${{ steps.image-name.outputs.name }}:${{ steps.docker-build-push.outputs.tag }}
          makeLatest: ${{ github.ref_name == 'main' }}
          tag: ${{ steps.docker-build-push.outputs.tag }}
